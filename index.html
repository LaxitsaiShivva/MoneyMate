<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoneyMate - Smart Personal Finance & AI Wealth Advisor</title>
    <!-- Hotfix for window.fetch platform bug in nested iframe sandboxes -->
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return currentFetch;
            },
            set: function(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Unable to patch window.fetch wrapper:', e);
        }

        // Mock WebSocket connections to localhost or dev domains to avoid connection failures
        try {
          var OriginalWS = window.WebSocket;
          if (OriginalWS) {
            window.WebSocket = function(url, protocols) {
              if (
                typeof url === 'string' &&
                (url.indexOf('localhost') !== -1 ||
                 url.indexOf('127.0.0.1') !== -1 ||
                 url.indexOf('.run.app') !== -1 ||
                 url.indexOf(':3000') !== -1)
              ) {
                console.info('Bypassing dev devserver WebSockets cleanly without error overlays:', url);
                var dummyWS = {
                  url: url,
                  readyState: 3, // CLOSED
                  send: function() {},
                  close: function() {},
                  addEventListener: function(event, callback) {
                    // Immediately trigger a clean close without raising warnings or console errors
                    if (event === 'close') {
                      setTimeout(function() {
                        try {
                          callback({ type: 'close', target: dummyWS, wasClean: true, code: 1000, reason: "HMR Disabled" });
                        } catch (e) {}
                      }, 100);
                    }
                  },
                  removeEventListener: function() {},
                  dispatchEvent: function() { return true; },
                  onopen: null,
                  onclose: null,
                  onerror: null,
                  onmessage: null
                };
                return dummyWS;
              }
              return new OriginalWS(url, protocols);
            };
            window.WebSocket.prototype = OriginalWS.prototype;
            window.WebSocket.CONNECTING = OriginalWS.CONNECTING;
            window.WebSocket.OPEN = OriginalWS.OPEN;
            window.WebSocket.CLOSING = OriginalWS.CLOSING;
            window.WebSocket.CLOSED = OriginalWS.CLOSED;
          }
        } catch (e) {
          console.error('WS patch error:', e);
        }

        // Suppress benign platform-specific Vite WebSocket reconnect rejections
        window.addEventListener('unhandledrejection', function(event) {
          try {
            var msg = '';
            if (event.reason) {
              if (typeof event.reason === 'string') {
                msg = event.reason;
              } else if (event.reason.message) {
                msg = event.reason.message;
              }
            }
            if (msg.indexOf('WebSocket') !== -1 || msg.indexOf('websocket') !== -1 || msg.indexOf('opened') !== -1) {
              event.preventDefault();
              event.stopPropagation();
              console.info('Suppressed benign sandbox HMR exception:', msg);
            }
          } catch (err) {}
        }, true);

        window.addEventListener('error', function(event) {
          try {
            var msg = event.message || '';
            if (msg.indexOf('WebSocket') !== -1 || msg.indexOf('websocket') !== -1) {
              event.preventDefault();
              event.stopPropagation();
              console.info('Suppressed benign sandbox WebSocket error:', msg);
            }
          } catch (err) {}
        }, true);
      })();
    </script>
    <style>
      /* Inject CSS to completely hide Vite full screen dev error overlays in sandboxes */
      vite-error-overlay,
      #vite-error-overlay-container,
      .vite-error-overlay {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
